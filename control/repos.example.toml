# Control-plane repo registry — the OPERATOR's fleet config.
#
# This is a TEMPLATE. The live registry lives on the executor under `control/`
# and is NOT version-controlled with any product repo — it is operator state
# (which repos exist, which Linux users run them, which machine/backend). A
# product repo only carries its own `.agent/` (prompts, hooks, setup, config).
#
# The control plane (running as `viktor`) reads this to: provision per-repo users,
# decide what to dispatch, and drop privilege to run each agent jailed. It never
# executes agent work itself.
#
# SECRETS DO NOT BELONG HERE. PATs / tokens live as 0600 files owned by each
# repo's Linux user, outside this file. The registry only references *which* user.

# ── Fleet-wide defaults; every [[repo]] may override any of these. ───────────
[defaults]
backend = "host"            # "host" = per-user uid + nftables + Squid; "docker" = per-repo container
assistant = "claude"        # "claude" | "codex"  (OpenCode later)
role = "dev"                # "dev" | "qa"
base_branch = "master"
work_branch = "auto/work"
proxy = "http://127.0.0.1:3128"   # host backend: the egress proxy the agent is locked to
max_concurrent = 2          # global cap on simultaneous runs across ALL repos

# ── One block per managed repo. ─────────────────────────────────────────────
[[repo]]
name = "floorplanner"                                   # id: used for run labels, locks, unit names
path = "/home/agent-floorplanner/repos/plantegner"      # the clone the agent operates on
user = "agent-floorplanner"                             # Linux user the control plane provisions + drops to
remote = "https://github.com/viktorfa/plantegner.git"   # used at provision time to clone
backend = "host"
assistant = "codex"
role = "dev"
permission_class = "A"      # A = sandbox/local (this repo); B = production — see §8
enabled = true              # control plane considers it at all
paused = false              # soft pause: finish any active run, dispatch no new ones
# Domains this repo needs ON TOP OF the fleet baseline allowlist — composed into
# the user's Squid allowlist (or the container firewall) at provision time.
extra_allowed_domains = []

[[repo]]
name = "example-service"
path = "/home/agent-example/repos/example-service"
user = "agent-example"
remote = "https://github.com/viktorfa/example-service.git"
backend = "docker"          # isolation via a per-repo container instead of a host uid
image = "example-service-agent"   # docker backend: image to run
permission_class = "B"
enabled = false
paused = false
extra_allowed_domains = ["api.example.com"]
