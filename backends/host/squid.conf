# Minimal allowlist forward proxy for the agent runner's host backend.
#
# No TLS interception (no ssl-bump): because the agent uses an explicit proxy
# (HTTPS_PROXY), it sends `CONNECT host:443` and Squid filters on that
# client-supplied hostname. Same trust model as SNI filtering — domain fronting
# is possible and accepted for Class A; tighten the allowlist to compensate.
# See docs/AGENT_DEV_SYSTEM.md §6/§7.

http_port 3128

# Clients: only this machine (the local agent), never other tailnet hosts —
# this proxy must not become an open relay.
acl agentclient src 127.0.0.1/32 ::1
http_access deny !agentclient

# The allowlist. dstdomain entries; a leading dot matches the domain + subdomains.
# Root-owned file; the agent cannot edit it.
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"
acl SSL_ports  port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# HTTPS via CONNECT: only to allowlisted hosts, only on 443.
http_access deny CONNECT !SSL_ports
http_access deny CONNECT !allowed_domains
# Plain HTTP: only allowlisted hosts on safe ports.
http_access deny !Safe_ports
http_access allow allowed_domains
http_access deny all

# Don't advertise the proxy or cache anything.
forwarded_for delete
via off
cache deny all
coredump_dir /var/spool/squid

# Audit trail — the allow/deny log is the prompt-injection / supply-chain signal.
access_log stdio:/var/log/squid/access.log
